name: Release components package

# Publishes @cangulo-blog/components to npm when its version changes on main.
# Idempotent: skips silently if the version in packages/components/package.json
# is already on the registry, so pushes without a bump are no-ops.
#
# Auth is npm Trusted Publishing (OIDC): npm is configured on the registry to
# trust this repo's release-components.yml workflow, so no token/secret is used
# (the package disallows tokens). This needs the id-token: write permission
# below and npm CLI >= 11.5.1 (installed in the publish step, since Node 20
# ships npm 10). Provenance is attached automatically.
on:
  push:
    branches: [main]
    paths:
      - "packages/components/**"
  workflow_dispatch:

permissions:
  contents: write # tag + GitHub release
  id-token: write # OIDC trusted publishing to npm

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and test package
        run: pnpm --filter @cangulo-blog/components test

      - name: Check if version is already published
        id: version
        working-directory: packages/components
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION already on npm — nothing to do."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      # Publish via OIDC trusted publishing — no token. npm's OIDC support
      # needs npm >= 11.5.1, but the pinned Node 20 ships npm 10, so upgrade
      # npm first. Pin to the 11.x line: npm 12 requires Node >= 22 and would
      # fail EBADENGINE on Node 20. Build the dist, then publish with plain npm
      # (pnpm publish does not yet do npm OIDC). Provenance is added automatically.
      - name: Publish to npm (OIDC trusted publishing)
        if: steps.version.outputs.published == 'false'
        working-directory: packages/components
        run: |
          npm install -g npm@11
          pnpm run build
          npm publish --access public

      - name: Tag and create GitHub release
        if: steps.version.outputs.published == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="components-v$VERSION"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "@cangulo-blog/components $VERSION" \
            --notes "Published @cangulo-blog/components@$VERSION to npm."
