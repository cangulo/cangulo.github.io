name: CodeQL

on:
  pull_request:
    branches: [main]
  schedule:
    # Monthly, offset from Dependabot's runs.
    - cron: "30 4 15 * *"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze JS/TS
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Analyze
        uses: github/codeql-action/analyze@v3
