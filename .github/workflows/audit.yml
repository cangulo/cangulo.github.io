name: Dependency audit

# Informational only — runs on a schedule so low-severity advisories never
# block PRs or deploys. Check the Actions tab for results.
on:
  schedule:
    - cron: "0 5 15 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Audit production dependencies
        run: pnpm audit --prod
