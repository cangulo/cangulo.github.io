version: 2
updates:
  # npm ecosystem also covers pnpm (pnpm-lock.yaml).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    ignore:
      # TypeScript 7 removed `baseUrl`, which @docusaurus/tsconfig still relies
      # on, so the major can't build until Docusaurus ships a TS7-ready config.
      # typecheck is editor-only (not in CI), so there's no urgency — revisit
      # by dropping this ignore once Docusaurus supports TS7.
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]
    groups:
      # One grouped PR per month for all minor/patch bumps; these auto-merge on
      # green CI (see dependabot-auto-merge.yml). Majors fall outside the group
      # and arrive as individual PRs for human review.
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    groups:
      actions-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
